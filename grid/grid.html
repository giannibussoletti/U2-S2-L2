<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>griglia responsive</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
  </head>
  <body>
    <h1>Griglia responsive</h1>
    <main>
      <!-- in Bootstrap ci sono 3 attori in gioco quando si vuole creare una griglia responsive
per gestire 1' impaginazione dei contenuti: "container", "row" e "col"
un container è un elemento di blocco con dei margini pre-applicati -->
      <div class="container">
        <!-- successivamente, andrebbe inserita una "row" all ' interno del container
        una "row" è un elemento con display: flex che gestirà in maniera responsive le colonne
        al suo interno -->
        <!-- NB Le row vanno sempre all'interno di un container -->
        <div class="row">
          <!-- All'interno delle row vanno inserite le colonne "col" -->
          <div class="col">Sono una col dentro una row dentro un container :)</div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
  </body>
</html>
